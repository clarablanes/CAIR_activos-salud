<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">

        <link rel="stylesheet" href="resources/fontawesome-all.min.css">

        <link rel="stylesheet" href="./resources/ol-layerswitcher.css">

        <style>
        html, body {
            background-color: #ffffff;
        }
        .ol-control > * {
            background-color: #f8f8f8!important;
            color: #444444!important;
            border-radius: 0px;
        }
        .ol-attribution a, .gcd-gl-input::placeholder, .search-layer-input-search::placeholder {
            color: #444444!important;
        }
        .search-layer-input-search {
            background-color: #f8f8f8!important;
        }
        .ol-control > *:focus, .ol-control >*:hover {
            background-color: rgba(248, 248, 248, 0.7)!important;
        } 
        .ol-control {
            background-color: rgba(255,255,255,.4) !important;
            padding: 2px !important;
        } 
        /* Limpieza radical del contenedor nativo de OpenLayers */
        .ol-popup {
            padding: 0px !important;
            border: none !important;
            background-color: transparent !important;
            box-shadow: none !important;
        }
        #popup-content {
            padding: 0px !important;
        }
        .ol-popup-closer {
            top: 15px !important;
            right: 15px !important;
            color: #333 !important;
            z-index: 9999;
            font-weight: bold;
            text-decoration: none;
            font-size: 18px;
        }
        </style>

        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        </style>
        <title></title>
    </head>
    <body>
        <div id="map">
            <div id="popup" class="ol-popup">
                <a href="#" id="popup-closer" class="ol-popup-closer"></a>
                <div id="popup-content"></div>
            </div>
        </div>
        <script src="resources/qgis2web_expressions.js"></script>
        <script src="./resources/functions.js"></script>
        <script src="./resources/ol.js"></script>
        <script src="./resources/ol-layerswitcher.js"></script>
        <script src="resources/photon-geocoder-autocomplete.min.js"></script>
        <script src="resources/olms.js"></script>
        <script src="layers/2705_R2_1.js"></script><script src="layers/2705_R1_2.js"></script><script src="layers/2005_R2_3.js"></script><script src="layers/2005_R3_4.js"></script><script src="layers/2005_R1_5.js"></script><script src="layers/505_R2_6.js"></script><script src="layers/505_R1_7.js"></script><script src="layers/505_R3_8.js"></script><script src="layers/Ruta8_9.js"></script><script src="layers/Ruta7_10.js"></script><script src="layers/Ruta6_11.js"></script><script src="layers/Ruta5_12.js"></script><script src="layers/Ruta4_13.js"></script><script src="layers/Ruta3_14.js"></script><script src="layers/Ruta2_15.js"></script><script src="layers/Ruta1_16.js"></script><script src="layers/labels_git_17.js"></script>
        <script src="styles/2705_R2_1_style.js"></script><script src="styles/2705_R1_2_style.js"></script><script src="styles/2005_R2_3_style.js"></script><script src="styles/2005_R3_4_style.js"></script><script src="styles/2005_R1_5_style.js"></script><script src="styles/505_R2_6_style.js"></script><script src="styles/505_R1_7_style.js"></script><script src="styles/505_R3_8_style.js"></script><script src="styles/Ruta8_9_style.js"></script><script src="styles/Ruta7_10_style.js"></script><script src="styles/Ruta6_11_style.js"></script><script src="styles/Ruta5_12_style.js"></script><script src="styles/Ruta4_13_style.js"></script><script src="styles/Ruta3_14_style.js"></script><script src="styles/Ruta2_15_style.js"></script><script src="styles/Ruta1_16_style.js"></script><script src="styles/labels_git_17_style.js"></script>
        <script src="./layers/layers.js" type="text/javascript"></script> 
        <script src="./resources/Autolinker.min.js"></script>
        <script src="./resources/qgis2web.js"></script>        

        <script>
          document.addEventListener("DOMContentLoaded", function() {
            // Buscamos el mapa de OpenLayers en la página
            var mapaOL = null;
            if (typeof map !== 'undefined') { mapaOL = map; }
            else if (typeof map_labels_git_17 !== 'undefined') { mapaOL = map_labels_git_17; }

            var observer = new MutationObserver(function(mutations) {
              mutations.forEach(function(mutation) {
                var popupContent = document.getElementById('popup-content');
                
                // Si el popup está abierto y tiene contenido pero no nuestro marco
                if (popupContent && popupContent.innerHTML.length > 0 && !popupContent.querySelector('.mi-marco-personalizado')) {
                  
                  var titulo = "Sala de teatro";
                  var frase = "";
                  var foto = "";
                  var color = "blue";
                  
                  // ESTRATEGIA DE SEGURIDAD: Intentamos extraer los datos limpios directamente del mapa interactivo
                  try {
                    if (mapaOL) {
                      var caracteristicas = mapaOL.getFeaturesAtPixel(mapaOL.getPixelFromCoordinate(mapaOL.getOverlayById('popup').getPosition()));
                      if (caracteristicas && caracteristicas.length > 0) {
                        var props = caracteristicas[0].getProperties();
                        if (props) {
                          if (props['TITULO']) titulo = props['TITULO'];
                          if (props['pepita_oro']) frase = props['pepita_oro'];
                          if (props['ruta_web']) foto = props['ruta_web'];
                          else if (props['photo']) foto = props['photo'];
                          if (props['color_marco']) color = props['color_marco'];
                        }
                      }
                    }
                  } catch(e) { console.log("Buscando por texto alternativo..."); }

                  // Si la estrategia del mapa falla, rescatamos el texto de la tabla rota pero forzamos la frase larga original
                  if (!frase) {
                    var textoCompleto = popupContent.innerText || "";
                    if (textoCompleto.toLowerCase().includes("sala de teatro") || textoCompleto.toLowerCase().includes("marionetas")) {
                      titulo = "Sala de teatro";
                      frase = "A VECES ME SIENTO A LA SOMBRA, CIERRO LOS OJOS, ESCUCHO EL SONIDO DEL AGUA Y DESCONECTO POR UNOS MINUTOS";
                      color = "blue";
                      foto = "fotos/teatro.jpg"; // Asegúrate de que tu archivo en la carpeta fotos se llama así, o cámbialo si es necesario
                    }
                  }

                  // Limpiamos cualquier rastro de file:// que se haya colado
                  if (foto) {
                    foto = foto.replace('file://', '');
                  }

                  // RECREAMOS TU DISEÑO MAGNÍFICO E IDENTICO A TU PRIMERA FOTO
                  var nuevoHTML = `
                    <div class="mi-marco-personalizado" style="max-width: 280px; text-align: center; overflow: hidden; padding: 12px; border-radius: 10px; box-sizing: border-box; border: 30px solid ${color}; background-color: white; font-family: sans-serif;">
                      <h3 style="margin: 10px 0 6px 0; font-size: 15px; color: #333; font-weight: bold; font-family: sans-serif;">${titulo}</h3>
                      <p style="margin: 0 0 12px 0; font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; font-family: sans-serif; font-weight: bold; line-height: 1.5; padding: 0 5px;">
                        "${frase}"
                      </p>
                      <img src="${foto}" style="width: 100%; max-height: 160px; object-fit: contain; border-radius: 4px; display: block; margin: 0 auto 5px auto;" onerror="this.src='fotos/teatro.jpg'; console.log('Error cargando ruta, usando alternativa');" />
                    </div>
                  `;
                  
                  // Reemplazamos la estructura defectuosa por tu diseño limpio
                  popupContent.innerHTML = nuevoHTML;
                }
              });
            });
            
            observer.observe(document.body, { childList: true, subtree: true });
          });
        </script>
    </body>
</html>
