        <script src="./resources/qgis2web.js"></script>        

        <script>
          document.addEventListener("DOMContentLoaded", function() {
            var observer = new MutationObserver(function(mutations) {
              mutations.forEach(function(mutation) {
                var popupContent = document.getElementById('popup-content');
                
                // Si el bocadillo de OpenLayers se abre y no tiene aún nuestro diseño aplicado
                if (popupContent && popupContent.innerHTML.trim() !== "" && !popupContent.querySelector('.mi-marco-personalizado')) {
                  
                  // Escaneamos la tabla interna que genera qgis2web
                  var filas = popupContent.querySelectorAll('tr');
                  var datos = {};
                  filas.forEach(function(fila) {
                    var th = fila.querySelector('th');
                    var td = fila.querySelector('td');
                    if (th && td) {
                      datos[th.textContent.trim()] = td.textContent.trim();
                    }
                  });

                  // Extraemos las variables (priorizando 'ruta_web')
                  var titulo = datos['TITULO'] || 'Sala de teatro';
                  var frase = datos['pepita_oro'] || '';
                  var fotoRaw = datos['ruta_web'] || datos['campo_web'] || datos['photo'] || '';
                  var color = datos['color_marco'] || 'red';

                  // Nos aseguramos de que la ruta de la foto sea limpia para la web
                  var fotoFinal = fotoRaw;
                  if (fotoRaw) {
                    var limpiaFile = fotoRaw.replace('file://', '').trim();
                    
                    // Si contiene una ruta larga local de Mac por error, nos quedamos solo con el nombre del archivo
                    if (limpiaFile.includes('/') && !limpiaFile.startsWith('fotos/')) {
                      var nombreArchivo = limpiaFile.substring(limpiaFile.lastIndexOf('/') + 1);
                      fotoFinal = 'fotos/' + nombreArchivo;
                    } else if (limpiaFile.includes('\\')) {
                      var nombreArchivo = limpiaFile.substring(limpiaFile.lastIndexOf('\\') + 1);
                      fotoFinal = 'fotos/' + nombreArchivo;
                    } else {
                      fotoFinal = limpiaFile; // Si ya es "fotos/imagen.jpg", la dejamos tal cual
                    }
                  }

                  // TU DISEÑO POLAROID EXACTO CON MÁRGENES Y ESPACIOS CORREGIDOS
                  var nuevoHTML = `
                    <div class="mi-marco-personalizado" style="max-width: 280px; text-align: center; overflow: hidden; padding: 12px; border-radius: 10px; box-sizing: border-box; border: 30px solid ${color}; background-color: white; font-family: sans-serif;">
                      <h3 style="margin: 10px 0 4px 0; font-size: 15px; color: #333; font-weight: bold; font-family: sans-serif;">${titulo}</h3>
                      <p style="margin: 0 0 12px 0; font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; font-family: sans-serif; font-weight: bold; line-height: 1.5; padding: 0 5px;">
                        "${frase}"
                      </p>
                      <img src="${fotoFinal}" style="width: 100%; max-height: 160px; object-fit: contain; border-radius: 4px; display: block; margin: 0 auto 5px auto;" />
                    </div>
                  `;
                  
                  // Inyectamos el diseño Polaroid limpio
                  popupContent.innerHTML = nuevoHTML;
                }
              });
            });
            observer.observe(document.body, { childList: true, subtree: true });
          });
        </script>
    </body>
</html>
